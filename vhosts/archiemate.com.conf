location / {
  proxy_pass http://archiemate_frontend:3000;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header Host $host;
  proxy_redirect off;
  client_max_body_size 100M;
}

location /health {
  proxy_pass http://archiemate_backend:8080;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header Host $host;
  proxy_redirect off;
  client_max_body_size 100M;
}

location /api {
  proxy_pass http://archiemate_backend:8080;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header Host $host;
  proxy_redirect off;
  client_max_body_size 100M;
}

location /swagger {
  proxy_pass http://archiemate_backend:8080;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header Host $host;
  proxy_redirect off;
  client_max_body_size 100M;
}

location /_next/webpack-hmr {
  proxy_pass http://archiemate_frontend:3000/_next/webpack-hmr;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
}
