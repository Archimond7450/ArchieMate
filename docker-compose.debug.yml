# Please refer https://aka.ms/HTTPSinContainer on how to setup an https developer certificate for your ASP .NET Core service.

version: "3.4"

services:
  archiemate_frontend:
    image: archiemate/frontend
    container_name: archiemate_frontend
    build:
      context: .
      dockerfile: ./ArchieMate.Frontend/Dockerfile.dev
    expose:
      - 3000
    volumes:
      - ./ArchieMate.Frontend:/app:rw
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1
      interval: 5s
      timeout: 5s
      retries: 5

  archiemate_backend:
    image: archiemate/backend
    container_name: archiemate_backend
    build:
      context: .
      dockerfile: ./ArchieMate.Backend/Dockerfile
    expose:
      - 8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - ~/.vsdbg:/remote_debugger:rw
      - ./logs:/logs:rw
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8080/health/live || exit 1
      interval: 5s
      timeout: 5s
      retries: 5

  archiemate_nginx:
    image: archiemate/nginx
    container_name: archiemate_nginx
    build:
      context: .
      dockerfile: ./nginx/Dockerfile.dev
    env_file: .env
    volumes:
      - ./vhosts:/etc/nginx/vhosts
    ports:
      - 8080:80
    depends_on:
      archiemate_frontend:
        condition: service_healthy
      archiemate_backend:
        condition: service_healthy
    healthcheck:
      test: service nginx status || exit 1
      interval: 60s
      timeout: 5s
      retries: 5

  db:
    image: postgres
    container_name: db
    expose:
      - 5432
    ports:
      - 5432:5432
    volumes:
      - ./db/data:/var/lib/postgresql/data:rw
    env_file: .env
    healthcheck:
      test: pg_isready -U archiemate -d archiemate_db
      interval: 5s
      timeout: 5s
      retries: 5
